<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>محول العملات</title>
	<style>
	  *{
	    margin: 0;
	    padding: 0;
	    font-family: system-ui;
	  }
	  body{
	    display: flex;
	    justify-content: center;
	    align-items: center;
	    background: #555;
	  }
	  .parent{
	    position: relative;
	    margin-top: 80px;
	    background: #EEE;
	    height: 500px;
	    width: 300px;
	    border-radius: 25px;
	    box-shadow: 0 25px 45px black;
	  }
	  .info{
	    margin: 20px;
	    text-align: center;
	    
	  }
	   .info h1 {
	     font-size: 25px;
	  }
	  .inputs{
	    position: absolute;
	    right: 30px;
	    top: 200px;
	  }
	  input{
	    margin: 10px;
	    padding: 3px;
	    border-radius: 8px;
	    width: 80%;
	  }

	</style>
</head>
<body>
  
  <div class="parent">
    <div class="info">
      <h1>محول العملات من دولار الي ريال والعكس</h1>
      <p>ادخل الدولار في الاسفل</p>
      <span>⬇️</span>
    </div>
    <div class="inputs">
      <input type="number" placeholder="USK" id="dollar">
      <input type="number" placeholder="SAR" id="sar">
    </div>
  </div>
  
  
  <script src="main.js"></script>
</body>
</html>
